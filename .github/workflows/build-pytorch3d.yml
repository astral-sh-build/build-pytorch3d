name: PyTorch3D

permissions: {}

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.release_tag || github.sha }}
  cancel-in-progress: true

jobs:
  plan-matrix:
    name: Plan PyTorch3D build matrix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}
    permissions:
      contents: read # for actions/checkout
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1
        with:
          version: "0.9.26"
          enable-cache: false

      - name: Generate build matrix
        id: generate-matrix
        run: |
          echo "matrix=$(uv run --script plan-matrix.py)" >> $GITHUB_OUTPUT
        env:
          LIMIT_MATRIX: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'full-build') && '1' || '0' }}

  build-wheels:
    name: Build Wheel
    needs: [plan-matrix]
    runs-on: ${{ matrix.RUNNER }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-build') }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Determine PyTorch3D version
        id: pytorch3d-version
        run: |
          # Extract PyTorch3D version from tag. Tags can be either:
          # - v0.7.9 (legacy format; maps directly to PyTorch3D version)
          # - v0.7.9-r1 (new format; strip -rN suffix to get PyTorch3D version)
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUTS_RELEASE_TAG}"
            # Remove -rN suffix if present
            PYTORCH3D_VERSION=$(printf '%s\\n' "${TAG}" | sed -E 's/-r[0-9]+$//')
          else
            PYTORCH3D_VERSION="v0.7.9"
          fi
          echo "version=${PYTORCH3D_VERSION}" >> $GITHUB_OUTPUT
          echo "Using PyTorch3D version: ${PYTORCH3D_VERSION}"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUTS_RELEASE_TAG: ${{ inputs.release_tag }}

      - name: Checkout PyTorch3D
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: facebookresearch/pytorch3d
          ref: ${{ steps.pytorch3d-version.outputs.version }}
          persist-credentials: false

      - name: Get source commit SHA
        id: source-commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Checkout utils
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: build_scripts
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1
        with:
          version: "0.9.26"
          enable-cache: false

      - name: Set CUDA and PyTorch versions
        run: |
          echo "MATRIX_CUDA_VERSION=$(echo ${{ matrix.MATRIX_CUDA_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_TORCH_VERSION=$(echo ${{ matrix.MATRIX_TORCH_VERSION }})" >> $GITHUB_ENV
          echo "MATRIX_PYTHON_VERSION=$(echo ${{ matrix.MATRIX_PYTHON_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_CUDA_VERSION=$(echo ${{ matrix.MANYLINUX_CUDA_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_CUDA_COMPAT_VERSION=$(echo ${{ matrix.MANYLINUX_CUDA_COMPAT_VERSION }})" >> $GITHUB_ENV
          echo "MANYLINUX_GLIBC_VERSION=$(echo ${{ matrix.MANYLINUX_GLIBC_VERSION }})" >> $GITHUB_ENV
          echo "CI_AUDITWHEEL_EXCLUDES=$(echo ${{ matrix.CI_AUDITWHEEL_EXCLUDES }})" >> $GITHUB_ENV
          # Avoid `echo` quoting to avoid interpreting the semicolon-delimited list as separate commands.
          echo "TORCH_CUDA_ARCH_LIST=\"${{ matrix.TORCH_CUDA_ARCH_LIST }}\"" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: |
          uv venv --python 3.13
          uv pip install cibuildwheel

      - name: Build wheels for Pytorch ${{ matrix.torch-version }}+cu${{ matrix.cuda-version }}
        run: |
          .venv/bin/cibuildwheel . --output-dir dist
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.target-arch }}
          CIBW_BUILD: cp${{ env.MATRIX_PYTHON_VERSION }}-*64
          CIBW_MANYLINUX_X86_64_IMAGE: pytorch/manylinux2_28-builder:cuda${{ env.MANYLINUX_CUDA_VERSION }}
          CIBW_MANYLINUX_AARCH64_IMAGE: pytorch/manylinuxaarch64-builder:cuda${{ env.MANYLINUX_CUDA_VERSION }}
          CIBW_BEFORE_ALL: >
            curl -LsSf https://astral.sh/uv/install.sh | sh
          # TODO(charlie): The PyTorch CUDA 12.9 index is missing cuda-bindings==12.9.4, but PyTorch 2.10 depends on it.
          CIBW_BEFORE_BUILD_LINUX: >
            uv pip install --system typing-extensions==4.12.2 setuptools wheel ninja &&
            if [ "${MATRIX_CUDA_VERSION}" = "129" ] && [ "${MATRIX_TORCH_VERSION}" = "2.10" ]; then uv pip install --system cuda-bindings==12.9.4; fi &&
            uv pip install --system --no-cache-dir torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/cu${MATRIX_CUDA_VERSION} &&
            bash build_scripts/prepare_for_build.sh ${{ steps.pytorch3d-version.outputs.version }}
          CIBW_ENVIRONMENT: >
            PATH=$PATH:/root/.local/bin
            CUDA_HOME="/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}"
            LIBRARY_PATH="/usr/lib64"
            LD_LIBRARY_PATH="/usr/lib64:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/lib64:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/targets/${{ matrix.target-arch }}-linux/lib:/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/extras/CUPTI/lib64"
            LDFLAGS="-ldl -L/usr/local/cuda-${{ env.MANYLINUX_CUDA_VERSION }}/targets/${{ matrix.target-arch }}-linux/lib/stubs"
            AUDITWHEEL_PLAT="manylinux_${{ env.MANYLINUX_GLIBC_VERSION }}_$(uname -m)"
            MATRIX_CUDA_VERSION="${{ env.MATRIX_CUDA_VERSION }}"
            MATRIX_TORCH_VERSION="${{ env.MATRIX_TORCH_VERSION }}"
            MATRIX_PYTHON_VERSION="${{ env.MATRIX_PYTHON_VERSION }}"
            MANYLINUX_CUDA_VERSION="${{ env.MANYLINUX_CUDA_VERSION }}"
            MANYLINUX_CUDA_COMPAT_VERSION="${{ env.MANYLINUX_CUDA_COMPAT_VERSION }}"
            CI_AUDITWHEEL_EXCLUDES="${{ env.CI_AUDITWHEEL_EXCLUDES }}"
            FORCE_CUDA="1"
            PYTORCH3D_FORCE_CXX11_ABI=${{ matrix.cxx11-abi }}
            TORCH_CUDA_ARCH_LIST=${{ env.TORCH_CUDA_ARCH_LIST }}
            MAX_JOBS=2
            UV_PYTHON=/opt/python/cp${{ env.MATRIX_PYTHON_VERSION }}-cp${{ env.MATRIX_PYTHON_VERSION }}/bin/python
          CIBW_SKIP: "*musllinux*"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w /tmp/cibuildwheel/repaired_wheel {wheel} ${CI_AUDITWHEEL_EXCLUDES}"
          CIBW_BUILD_FRONTEND: "build[uv]; args: --no-isolation"

      - name: Embed metadata into wheel
        run: |
          for wheel in dist/*.whl; do
            uv run --script build_scripts/embed_patches.py "$wheel" "build_scripts/patches/${PYTORCH3D_VERSION}" \
              --license-expression "BSD-3-Clause AND MIT" \
              --license-file "LICENSE:LICENSE" \
              --license-file "LICENSE-3RD-PARTY:LICENSE-3RD-PARTY" \
              --source-repo "https://github.com/facebookresearch/pytorch3d" \
              --source-tag "${PYTORCH3D_VERSION}" \
              --source-commit "${SOURCE_COMMIT}" \
              --build-repo "https://github.com/astral-sh-build/build-pytorch3d" \
              --build-commit "${BUILD_COMMIT}"
          done
        env:
          PYTORCH3D_VERSION: ${{ steps.pytorch3d-version.outputs.version }}
          SOURCE_COMMIT: ${{ steps.source-commit.outputs.sha }}
          BUILD_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Log Built Wheels
        run: |
          wheel_name=$(ls dist/*whl | xargs -n 1 basename)
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - name: Rename wheel
        run: |
          tmpname=cu${{ matrix.cuda-version }}torch${{ matrix.torch-version }}cxx11abi${{ matrix.cxx11-abi }}
          wheel_name=$(ls dist/*whl | xargs -n 1 basename | sed "s/-/+$tmpname-/2")
          ls dist/*whl |xargs -I {} mv {} dist/${wheel_name}
          echo "wheel_name=${wheel_name}" >> $GITHUB_ENV
          ls dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{env.wheel_name}}
          path: dist/${{env.wheel_name}}
          if-no-files-found: error

  create-release:
    name: Create release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          gh release create "${RELEASE_TAG}" ./dist/*.whl
          --target "${GITHUB_SHA}"
          --title "${RELEASE_TAG}"
          --notes ""
          --repo "${GITHUB_REPOSITORY}"
